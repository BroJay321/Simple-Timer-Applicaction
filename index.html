<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event-Driven Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   

    <div class="timer-container"> 
        <p>Fe Jay Pacay BSIT-2D 2025/2026</p>
        <p>Partido State University</p>
        <p>PF2-Event Driven Programming</p>
        <p>Instructor: Arjay Abio</p>
        <h1>JavaScript Timer</h1>
        
        <div id="display">00:00:00</div>
        
        <div id="status">Status: Reset</div>

        <div class="controls">
            <button id="startBtn">Start</button>
            <button id="pauseBtn">Pause</button>
            <button id="resetBtn">Reset</button>
        </div>
        
        <p class="shortcuts">Shortcuts: [S] Start | [P] Pause | [R] Reset</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
